<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Score" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  </head>
  <body>
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="icon-btn active" id="toolPen" title="Freehand pen">
          <img src="icon/Pen.svg" alt="Pen" />
        </button>
        <button class="icon-btn" id="toolSelect" title="Select">
          <img src="icon/Select.svg" alt="Select" />
        </button>
        <div class="sep"></div>
        <button class="icon-btn" id="typeModeBtn" title="Type (⌥T)">
          <img src="icon/Type.svg" alt="Type" />
        </button>
        <button class="icon-btn" id="bwBtn" title="Color">
          <img src="icon/BW.svg" alt="Color" />
        </button>
        <div class="sep"></div>
        <button class="icon-btn" id="playBtn" title="Play (⌥P)">
          <img src="icon/Play.svg" alt="Play" />
        </button>
        <button class="icon-btn" id="clearBtn" title="Clear (⌥D)">
          <img src="icon/Clear.svg" alt="Clear" />
        </button>
        <input type="file" id="loadInput" accept=".json" style="display: none" />
        <span class="glyph-keys" id="glyphKeys"></span>
      </div>

      <div class="toolbar-center">
        <button class="icon-btn active" id="fontRegular" title="Regular">
          <img src="icon/Regular.svg" alt="Regular" />
        </button>
        <button class="icon-btn" id="fontBold" title="Bold">
          <img src="icon/Bold.svg" alt="Bold" />
        </button>
        <button class="icon-btn" id="fontLine" title="Line">
          <img src="icon/Line.svg" alt="Line" />
        </button>
        <button class="icon-btn" id="fontDot" title="Dot">
          <img src="icon/Dot.svg" alt="Dot" />
        </button>
      </div>

      <div class="toolbar-right">
        <div class="slider-wrap">
          <label>Tracking</label>
          <input type="range" id="trackingSlider" min="-80" max="20" value="10" step="2" />
        </div>
      </div>
    </div>

    <div id="sketch-container">
      <div class="tri-count" id="triCount"></div>
    </div>

    <div id="glyphPrompt">
      <div class="glyph-dialog">
        <div class="glyph-dialog-label">Assign selected shapes to character</div>
        <input id="glyphInput" maxlength="1" autocomplete="off" spellcheck="false" />
        <div class="glyph-dialog-hint">A – Z · a – z · ? ! . , -</div>
      </div>
    </div>

    <div id="overwritePrompt">
      <div class="glyph-dialog">
        <div class="glyph-dialog-label">
          "<span id="overwriteChar"></span>" is already saved. Overwrite?
        </div>
        <div class="overwrite-btns">
          <button class="btn" id="overwriteConfirmBtn">Overwrite</button>
          <button class="btn" id="overwriteCancelBtn">Cancel</button>
        </div>
      </div>
    </div>

    <textarea
      id="typeCapture"
      style="position: fixed; left: -9999px; width: 1px; height: 1px; opacity: 0"
      tabindex="-1"
      autocomplete="off"
      spellcheck="false"
    ></textarea>

    <script src="main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
