<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typographic Score</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap");

      @font-face {
        font-family: "Score";
        src: url("Score-Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a0a;
        color: #ccc;
        font-family: "IBM Plex Mono", monospace;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 32px;
        border-bottom: 1px solid #222;
        flex-shrink: 0;
      }

      .top-bar h1 {
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #555;
      }

      .controls {
        display: flex;
        gap: 12px;
      }

      .btn {
        background: transparent;
        border: 1px solid #333;
        color: #666;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 20px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn:hover {
        border-color: #888;
        color: #ccc;
      }
      .btn.active {
        background: #ddd;
        color: #0a0a0a;
        border-color: #ddd;
      }

      /* Lines section */
      .lines-bar {
        padding: 6px 32px;
        border-bottom: 1px solid #222;
        display: flex;
        flex-direction: column;
        gap: 1px;
        flex-shrink: 0;
      }

      .line-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 4px 0;
        border-bottom: 1px solid #1a1a1a;
      }

      .char-select {
        font-family: "IBM Plex Mono", monospace;
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: #0a0a0a;
        border: 1px solid #333;
        padding: 3px 6px;
        cursor: pointer;
        min-width: 62px;
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        transition: border-color 0.2s, opacity 0.2s;
        opacity: 0.6;
      }
      .char-select:hover,
      .char-select:focus {
        opacity: 1;
        border-color: currentColor;
      }

      .line-input {
        flex: 1;
        background: transparent;
        border: none;
        border-bottom: 1px solid #222;
        outline: none;
        font-family: "IBM Plex Mono", monospace;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 2px;
        padding: 3px 0;
        transition: border-color 0.2s;
      }
      .line-input::placeholder {
        color: #333;
      }
      .line-input:focus {
        border-bottom-color: #555;
      }

      /* Params */
      .params {
        display: flex;
        align-items: center;
        gap: 24px;
        padding: 10px 32px;
        border-bottom: 1px solid #222;
        flex-shrink: 0;
        flex-wrap: wrap;
      }

      .param {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .param label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #444;
        white-space: nowrap;
      }

      .param input[type="range"] {
        width: 90px;
        -webkit-appearance: none;
        height: 2px;
        background: #2a2a2a;
        outline: none;
      }
      .param input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        background: #fff;
        border-radius: 50%;
        cursor: pointer;
      }

      .param .val {
        font-size: 10px;
        color: #555;
        min-width: 30px;
        text-align: right;
      }

      /* Canvas */
      .canvas-area {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #mainCanvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .scan-info {
        position: absolute;
        bottom: 20px;
        left: 32px;
        font-size: 10px;
        letter-spacing: 2px;
        color: #444;
        text-transform: uppercase;
        pointer-events: none;
      }

      .font-name-tag {
        position: absolute;
        bottom: 20px;
        right: 32px;
        font-size: 10px;
        letter-spacing: 2px;
        color: #444;
        text-transform: uppercase;
        pointer-events: none;
      }

      /* Font drag-and-drop */
      .font-drop-overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 10, 0.88);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 100;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .font-drop-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      .font-drop-overlay .drop-label {
        font-size: 11px;
        letter-spacing: 6px;
        text-transform: uppercase;
        color: #fff;
      }
      .font-drop-overlay .drop-hint {
        font-size: 10px;
        letter-spacing: 2px;
        color: #555;
        text-transform: uppercase;
      }

      .font-drop-border {
        position: fixed;
        inset: 12px;
        border: 1px dashed #444;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 99;
      }
      .font-drop-border.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <h1>Typographic Score</h1>
      <div class="controls">
        <button class="btn" id="playBtn">Play</button>
        <button class="btn" id="stopBtn">Stop</button>
      </div>
    </div>

    <div class="lines-bar" id="linesBar"></div>

    <div class="params">
      <div class="param">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="1" max="60" value="12" />
        <span class="val" id="speedVal">12</span>
      </div>
      <div class="param">
        <label>Font Size</label>
        <input type="range" id="sizeSlider" min="40" max="280" value="110" />
        <span class="val" id="sizeVal">110</span>
      </div>
      <div class="param">
        <label>Tracking</label>
        <input type="range" id="trackingSlider" min="-40" max="40" value="0" />
        <span class="val" id="trackingVal">0</span>
      </div>
      <div class="param">
        <label>Line Height</label>
        <input type="range" id="lineHeightSlider" min="0" max="150" value="90" />
        <span class="val" id="lineHeightVal">0.9</span>
      </div>
      <div class="param">
        <button class="btn active" id="fontScoreBtn">Score</button>
        <button class="btn" id="fontIBMBtn">IBM Mono</button>
      </div>
    </div>

    <div class="canvas-area">
      <canvas id="mainCanvas"></canvas>
      <div class="scan-info" id="scanInfo">Ready</div>
      <div class="font-name-tag" id="fontNameTag">Score</div>
    </div>

    <div class="font-drop-border" id="fontDropBorder"></div>
    <div class="font-drop-overlay" id="fontDropOverlay">
      <div class="drop-label">Drop font file</div>
      <div class="drop-hint">otf · ttf · woff · woff2</div>
    </div>

    <script>
      // ─── Character presets ────────────────────────────────────────────────────────
      // wave/voices/detuneCents apply to regular oscillator types.
      // fm: true        → FM synthesis (carrier + modulator). fmRatio & fmIndex control timbre.
      // ring: true      → Ring modulation (carrier × modulator). ringRatio sets mod frequency.
      // pulse: true     → 30% duty-cycle pulse wave via PeriodicWave (nasal/reedy).
      // formant: true   → Sawtooth + 3 parallel bandpass filters (vocal/talking character).
      // saturation: true → Soft-clip waveshaper after the line (makes sub-bass audible).

      const CHAR_PRESETS = {
        sine: {
          label: "SINE",
          minFreq: 220,
          maxFreq: 1400,
          wave: "sine",
          oscCount: 12,
          voices: 1,
          detuneCents: 1,
          reverbMult: 2.2,
          saturation: false,
          fm: false,
          ring: false,
          pulse: false,
          formant: false,
        },
        pad: {
          label: "PAD",
          minFreq: 140,
          maxFreq: 900,
          wave: "sine",
          oscCount: 10,
          voices: 3,
          detuneCents: 6,
          reverbMult: 3.0,
          saturation: false,
          fm: false,
          ring: false,
          pulse: false,
          formant: false,
        },
        tri: {
          label: "TRI",
          minFreq: 180,
          maxFreq: 1200,
          wave: "triangle",
          oscCount: 10,
          voices: 1,
          detuneCents: 3,
          reverbMult: 2.0,
          saturation: false,
          fm: false,
          ring: false,
          pulse: false,
          formant: false,
        },
        glass: {
          label: "GLASS",
          minFreq: 400,
          maxFreq: 2400,
          wave: "sine",
          oscCount: 8,
          voices: 1,
          detuneCents: 0,
          reverbMult: 3.5,
          saturation: false,
          fm: true,
          ring: false,
          pulse: false,
          formant: false,
          fmRatio: 2.0,
          fmIndex: 0.15,
        },
        bell: {
          label: "BELL",
          minFreq: 300,
          maxFreq: 3000,
          wave: "sine",
          oscCount: 8,
          voices: 1,
          detuneCents: 0,
          reverbMult: 3.0,
          saturation: false,
          fm: true,
          ring: false,
          pulse: false,
          formant: false,
          fmRatio: 3.5,
          fmIndex: 0.3,
        },
        air: {
          label: "AIR",
          minFreq: 800,
          maxFreq: 4000,
          wave: "sine",
          oscCount: 8,
          voices: 2,
          detuneCents: 5,
          reverbMult: 4.0,
          saturation: false,
          fm: false,
          ring: false,
          pulse: false,
          formant: false,
        },
        vform: {
          label: "VFORM",
          minFreq: 120,
          maxFreq: 900,
          wave: "sawtooth",
          oscCount: 10,
          voices: 1,
          detuneCents: 2,
          reverbMult: 2.0,
          saturation: false,
          fm: false,
          ring: false,
          pulse: false,
          formant: true,
        },
        sub: {
          label: "SUB",
          minFreq: 40,
          maxFreq: 120,
          wave: "sine",
          oscCount: 6,
          voices: 1,
          detuneCents: 1,
          reverbMult: 0.5,
          saturation: true,
          fm: false,
          ring: false,
          pulse: false,
          formant: false,
        },
      };

      const CHAR_KEYS = Object.keys(CHAR_PRESETS);

      // Random vivid RGB colors generated at load time
      function randomVividColor() {
        const h = Math.floor(Math.random() * 360);
        return `hsl(${h}, 100%, 55%)`;
      }
      const LINE_COLORS = [randomVividColor(), randomVividColor(), randomVividColor()];
      const LINE_DEFAULTS = [
        { text: "ACDEFHJOQ", char: "sine" },
        { text: "", char: "tri" },
        { text: "", char: "sub" },
      ];

      // ─── State ────────────────────────────────────────────────────────────────────

      let lines = LINE_DEFAULTS.map((d, i) => ({
        ...d,
        color: LINE_COLORS[i],
        oscPool: [],
        lineGain: null,
        satNode: null,
        textWidth: 0,
        offsetX: 0,
        zoneTop: 0,
        zoneH: 0,
        zoneMid: 0,
        _input: null,
      }));

      let audioCtx = null;
      let isPlaying = false;
      let scanX = 0;
      let scanStart = 0;
      let scanEnd = 0;
      let animId = null;
      let pixelData = null;
      let lastFreqs = [[], [], []]; // active freqs per line per frame
      let frameCount = 0;

      // Shared audio nodes
      let masterGain = null,
        compressor = null;
      let reverbNode = null,
        dryGain = null,
        wetGain = null;

      // Font state
      let currentFontFamily = '"Score"';
      let currentFontName = "Score";

      // ─── DOM refs ─────────────────────────────────────────────────────────────────

      const canvas = document.getElementById("mainCanvas");
      const ctx = canvas.getContext("2d");
      const playBtn = document.getElementById("playBtn");
      const stopBtn = document.getElementById("stopBtn");
      const speedSlider = document.getElementById("speedSlider");
      const sizeSlider = document.getElementById("sizeSlider");
      const VOLUME = 0.3;
      const REVERB = 0.45;
      const trackingSlider = document.getElementById("trackingSlider");
      const lineHeightSlider = document.getElementById("lineHeightSlider");
      const scanInfo = document.getElementById("scanInfo");
      const fontNameTag = document.getElementById("fontNameTag");
      const linesBar = document.getElementById("linesBar");
      const fontScoreBtn = document.getElementById("fontScoreBtn");
      const fontIBMBtn = document.getElementById("fontIBMBtn");

      const FONTS = {
        score: { family: '"Score"', name: "Score" },
        ibm: { family: '"IBM Plex Mono", monospace', name: "IBM Plex Mono" },
      };

      function switchFont(key) {
        const f = FONTS[key];
        currentFontFamily = f.family;
        currentFontName = f.name;
        fontNameTag.textContent = f.name;
        lines.forEach((l) => {
          if (l._input) l._input.style.fontFamily = f.family;
        });
        fontScoreBtn.classList.toggle("active", key === "score");
        fontIBMBtn.classList.toggle("active", key === "ibm");
        if (!isPlaying) renderText();
      }

      fontScoreBtn.addEventListener("click", () => switchFont("score"));
      fontIBMBtn.addEventListener("click", () => switchFont("ibm"));

      // ─── Build line UI rows ───────────────────────────────────────────────────────

      function buildLineRows() {
        linesBar.innerHTML = "";
        lines.forEach((line, i) => {
          const row = document.createElement("div");
          row.className = "line-row";

          const charBtn = document.createElement("select");
          charBtn.className = "char-select";
          charBtn.style.color = line.color;
          CHAR_KEYS.forEach((key) => {
            const opt = document.createElement("option");
            opt.value = key;
            opt.textContent = CHAR_PRESETS[key].label;
            if (key === line.char) opt.selected = true;
            charBtn.appendChild(opt);
          });
          charBtn.addEventListener("change", () => {
            line.char = charBtn.value;
            if (!isPlaying) renderText();
          });

          const input = document.createElement("input");
          input.type = "text";
          input.className = "line-input";
          input.placeholder = `layer ${i + 1}…`;
          input.value = line.text;
          input.style.color = line.color;
          input.style.fontFamily = currentFontFamily;
          input.addEventListener("input", () => {
            line.text = input.value;
            if (!isPlaying) renderText();
          });
          line._input = input;

          row.appendChild(charBtn);
          row.appendChild(input);
          linesBar.appendChild(row);
        });
      }

      buildLineRows();

      // ─── Audio utilities ──────────────────────────────────────────────────────────

      function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      }

      function createReverb(duration, decay) {
        const sr = audioCtx.sampleRate;
        const len = Math.floor(sr * duration);
        const buf = audioCtx.createBuffer(2, len, sr);
        for (let c = 0; c < 2; c++) {
          const ch = buf.getChannelData(c);
          for (let i = 0; i < len; i++) {
            ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
          }
        }
        const conv = audioCtx.createConvolver();
        conv.buffer = buf;
        return conv;
      }

      function makeSatCurve(amount) {
        const n = 256;
        const curve = new Float32Array(n);
        for (let i = 0; i < n; i++) {
          const x = (i * 2) / n - 1;
          curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
        }
        return curve;
      }

      function teardownAudioGraph() {
        lines.forEach((line) => {
          line.oscPool.forEach((slot) => {
            slot.oscs.forEach((o) => {
              try {
                o.stop();
              } catch (e) {}
            });
            if (slot.modGainNode) {
              try {
                slot.modGainNode.disconnect();
              } catch (e) {}
            }
            if (slot.extraNodes) {
              slot.extraNodes.forEach((n) => {
                try {
                  n.disconnect();
                } catch (e) {}
              });
            }
            try {
              slot.gain.disconnect();
            } catch (e) {}
          });
          line.oscPool = [];
          if (line.satNode) {
            try {
              line.satNode.disconnect();
            } catch (e) {}
            line.satNode = null;
          }
          if (line.lineGain) {
            try {
              line.lineGain.disconnect();
            } catch (e) {}
            line.lineGain = null;
          }
        });
        [masterGain, compressor, dryGain, reverbNode, wetGain].forEach((n) => {
          if (n) {
            try {
              n.disconnect();
            } catch (e) {}
          }
        });
        masterGain = compressor = dryGain = reverbNode = wetGain = null;
      }

      function setupAudioGraph() {
        teardownAudioGraph();

        const reverbAmt = REVERB;

        // Shared output chain: master → compressor → dry+wet → destination
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 1.0;

        compressor = audioCtx.createDynamicsCompressor();
        compressor.threshold.value = -14;
        compressor.knee.value = 8;
        compressor.ratio.value = 6;
        compressor.attack.value = 0.005;
        compressor.release.value = 0.15;

        reverbNode = createReverb(2.5, 2.5);
        dryGain = audioCtx.createGain();
        wetGain = audioCtx.createGain();
        dryGain.gain.value = 1 - reverbAmt * 0.55;
        wetGain.gain.value = reverbAmt * 1.1;

        masterGain.connect(compressor);
        compressor.connect(dryGain);
        compressor.connect(reverbNode);
        dryGain.connect(audioCtx.destination);
        reverbNode.connect(wetGain);
        wetGain.connect(audioCtx.destination);

        // Per-line audio
        lines.forEach((line) => {
          const p = CHAR_PRESETS[line.char];

          line.lineGain = audioCtx.createGain();
          line.lineGain.gain.value = 1.0;

          // SUB: add soft-clipping waveshaper for audibility on small speakers
          if (p.saturation) {
            line.satNode = audioCtx.createWaveShaper();
            line.satNode.curve = makeSatCurve(80);
            line.satNode.oversample = "4x";
            line.lineGain.connect(line.satNode);
            line.satNode.connect(masterGain);
          } else {
            line.satNode = null;
            line.lineGain.connect(masterGain);
          }

          // Build oscillator pool
          const { minFreq, maxFreq, wave, oscCount, voices, detuneCents } = p;

          // PULSE: pre-build PeriodicWave once, reuse per oscillator
          let pulseWave = null;
          if (p.pulse) {
            const duty = 0.3,
              nh = 48;
            const real = new Float32Array(nh + 1);
            const imag = new Float32Array(nh + 1);
            for (let n = 1; n <= nh; n++)
              imag[n] = (2 / (n * Math.PI)) * Math.sin(n * Math.PI * duty);
            pulseWave = audioCtx.createPeriodicWave(real, imag);
          }

          // Helper: evenly spread N detune values across ±detuneCents
          function spreadDetunes(n, cents) {
            if (n === 1) return [0];
            return Array.from({ length: n }, (_, i) => -cents + (2 * cents * i) / (n - 1));
          }

          for (let i = 0; i < oscCount; i++) {
            const freq = minFreq * Math.pow(maxFreq / minFreq, i / (oscCount - 1));
            const oscs = [];
            const gain = audioCtx.createGain();
            gain.gain.value = 0;
            gain.connect(line.lineGain);

            let modGainNode = null;
            let extraNodes = [];

            if (p.fm) {
              // ── FM synthesis ─────────────────────────────────────────────────────
              const carrier = audioCtx.createOscillator();
              const modulator = audioCtx.createOscillator();
              modGainNode = audioCtx.createGain();

              carrier.type = "sine";
              carrier.frequency.value = freq;
              carrier.detune.value = (Math.random() - 0.5) * detuneCents * 2;
              modulator.type = "sine";
              modulator.frequency.value = freq * (p.fmRatio || 2.0);
              modGainNode.gain.value = freq * (p.fmIndex || 1.8);

              modulator.connect(modGainNode);
              modGainNode.connect(carrier.frequency);
              carrier.connect(gain);
              carrier.start();
              modulator.start();
              oscs.push(carrier, modulator);
            } else if (p.ring) {
              // ── Ring modulation (carrier × modulator) ────────────────────────────
              // Modulator signal is added to ringGain.gain (which starts at 0),
              // so effective gain oscillates between −1 and +1 → true ring mod.
              const carrier = audioCtx.createOscillator();
              const modulator = audioCtx.createOscillator();
              const ringGain = audioCtx.createGain();
              ringGain.gain.value = 0;

              carrier.type = "sine";
              carrier.frequency.value = freq;
              modulator.type = "sine";
              modulator.frequency.value = freq * (p.ringRatio || 0.75);

              modulator.connect(ringGain.gain);
              carrier.connect(ringGain);
              ringGain.connect(gain);

              carrier.start();
              modulator.start();
              oscs.push(carrier, modulator);
              extraNodes.push(ringGain);
            } else if (p.formant) {
              // ── Vocal formant: sawtooth + 3 parallel bandpass filters ────────────
              // Formant ratios tuned for a neutral "AH"-like vowel.
              const osc = audioCtx.createOscillator();
              osc.type = "sawtooth";
              osc.frequency.value = freq;
              osc.detune.value = (Math.random() - 0.5) * detuneCents * 2;

              const fmix = audioCtx.createGain();
              fmix.gain.value = 0.6;

              [
                [1.0, 8],
                [2.3, 14],
                [4.2, 18],
              ].forEach(([ratio, Q]) => {
                const bf = audioCtx.createBiquadFilter();
                bf.type = "bandpass";
                bf.frequency.value = Math.min(freq * ratio, 5000);
                bf.Q.value = Q;
                osc.connect(bf);
                bf.connect(fmix);
                extraNodes.push(bf);
              });

              fmix.connect(gain);
              osc.start();
              oscs.push(osc);
              extraNodes.push(fmix);
            } else {
              // ── Regular wave (sine / tri / saw / pulse / cluster) ────────────────
              spreadDetunes(voices, detuneCents).forEach((d) => {
                const osc = audioCtx.createOscillator();
                if (p.pulse) {
                  osc.setPeriodicWave(pulseWave);
                } else {
                  osc.type = wave;
                }
                osc.frequency.value = freq;
                osc.detune.value = d + (Math.random() - 0.5) * 2;
                osc.connect(gain);
                osc.start();
                oscs.push(osc);
              });
            }

            line.oscPool.push({ oscs, gain, freq, modGainNode, extraNodes });
          }
        });
      }

      // ─── Canvas ───────────────────────────────────────────────────────────────────

      function resizeCanvas() {
        const area = canvas.parentElement;
        canvas.width = area.clientWidth;
        canvas.height = area.clientHeight;
        renderText();
      }

      function zoneOf(lineIdx) {
        const l = lines[lineIdx];
        return { top: l.zoneTop, h: l.zoneH, mid: l.zoneMid };
      }

      const LEFT_MARGIN = 48;

      function renderText() {
        const fontSize = parseInt(sizeSlider.value);
        const tracking = parseInt(trackingSlider.value);
        ctx.letterSpacing = tracking + "px";
        const lineSpacing = fontSize * (parseInt(lineHeightSlider.value) / 100);
        const totalH = lineSpacing * (lines.length - 1);
        const startY = canvas.height / 2 - totalH / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = `${fontSize}px ${currentFontFamily}`;
        ctx.textBaseline = "middle";
        ctx.textAlign = "left";

        lines.forEach((line, i) => {
          const text = line.text || "";
          const midY = startY + i * lineSpacing;
          const zoneH = fontSize * 1.05; // scan zone = just enough to cover one line

          line.zoneMid = midY;
          line.zoneH = zoneH;
          line.zoneTop = midY - zoneH / 2;
          line.offsetX = LEFT_MARGIN;

          const metrics = ctx.measureText(text || "O");
          const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.75;
          const descent = metrics.actualBoundingBoxDescent || fontSize * 0.25;
          const pad = fontSize * 0.15;
          line.zoneTop = midY - ascent - pad;
          line.zoneH = ascent + descent + pad * 2;
          line.textWidth = text ? Math.ceil(metrics.width) : 0;

          if (text) {
            ctx.fillStyle = line.color;
            ctx.fillText(text, LEFT_MARGIN, midY);
          }
        });

        pixelData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      }

      function getColumnPixelsForLine(x, lineIdx) {
        const zone = zoneOf(lineIdx);
        const top = Math.floor(zone.top);
        const bottom = Math.floor(zone.top + zone.h);
        const pixels = [];

        for (let y = top; y < bottom; y++) {
          const idx = (y * canvas.width + x) * 4;
          const brightness =
            (pixelData.data[idx] + pixelData.data[idx + 1] + pixelData.data[idx + 2]) / 3;
          if (brightness > 100) {
            pixels.push({ normalizedY: 1 - (y - top) / (bottom - top) });
          }
        }
        return pixels;
      }

      // ─── Playback ─────────────────────────────────────────────────────────────────

      function startPlayback() {
        if (isPlaying) return;
        initAudio();
        renderText();

        const activeLines = lines.filter((l) => l.textWidth > 0);
        if (!activeLines.length) return;

        isPlaying = true;
        frameCount = 0;
        playBtn.classList.add("active");

        scanStart = Math.min(...activeLines.map((l) => l.offsetX));
        scanEnd = Math.max(...activeLines.map((l) => l.offsetX + l.textWidth));
        scanX = scanStart;

        setupAudioGraph();
        animate();
      }

      function stopPlayback(finished = false) {
        isPlaying = false;
        playBtn.classList.remove("active");
        if (animId) {
          cancelAnimationFrame(animId);
          animId = null;
        }

        if (audioCtx) {
          lines.forEach((line) => {
            line.oscPool.forEach((slot) => {
              slot.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            });
          });
          setTimeout(teardownAudioGraph, 400);
        }

        scanInfo.textContent = finished ? "Finished" : "Stopped";
        setTimeout(() => {
          renderText();
        }, 150);
      }

      function animate() {
        if (!isPlaying) return;

        frameCount++;
        const speed = parseInt(speedSlider.value);

        if (frameCount % Math.max(1, Math.floor(60 / speed)) === 0) {
          scanColumn();
          scanX++;
          if (scanX > scanEnd) {
            setTimeout(() => stopPlayback(true), 700);
            return;
          }
        }

        drawFrame();
        animId = requestAnimationFrame(animate);
      }

      function scanColumn() {
        const volume = VOLUME;
        lastFreqs = lines.map(() => []);

        lines.forEach((line, li) => {
          const pool = line.oscPool;
          if (!pool.length) return;

          const preset = CHAR_PRESETS[line.char];
          const pixels = getColumnPixelsForLine(scanX, li);

          const activeBands = new Set();
          pixels.forEach((p) => {
            const idx = Math.round(p.normalizedY * (pool.length - 1));
            if (idx >= 0 && idx < pool.length) activeBands.add(idx);
          });

          const n = activeBands.size;
          // SUB gets a boost since low freqs are quieter perceptually
          const boost = preset.saturation ? 1.4 : 1.0;
          const gainPerSlot = n > 0 ? (volume * boost * 0.5) / Math.sqrt(n) : 0;

          // Attack/release differ per character feel
          const attack = preset.fm ? 0.04 : preset.voices > 1 ? 0.02 : 0.05;
          const release = preset.saturation ? 0.14 : preset.reverbMult > 1 ? 0.11 : 0.07;

          pool.forEach((slot, i) => {
            if (activeBands.has(i)) {
              slot.gain.gain.linearRampToValueAtTime(gainPerSlot, audioCtx.currentTime + attack);
              lastFreqs[li].push(Math.round(slot.freq));
            } else {
              slot.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + release);
            }
          });
        });

        const pct = (((scanX - scanStart) / (scanEnd - scanStart)) * 100).toFixed(0);
        const active = lastFreqs.filter((f) => f.length > 0).length;
        const chars = lines
          .filter((_, i) => lastFreqs[i].length > 0)
          .map((l) => CHAR_PRESETS[l.char].label)
          .join(" · ");
        scanInfo.textContent = `${pct}%${chars ? " — " + chars : ""}`;
      }

      function drawFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const fontSize = parseInt(sizeSlider.value);
        ctx.font = `${fontSize}px ${currentFontFamily}`;
        ctx.letterSpacing = parseInt(trackingSlider.value) + "px";
        ctx.textBaseline = "middle";
        ctx.textAlign = "left";

        lines.forEach((line, i) => {
          if (!line.text) return;
          const zone = zoneOf(i);

          // Scanned — dim
          ctx.save();
          ctx.beginPath();
          ctx.rect(0, zone.top, scanX, zone.h);
          ctx.clip();
          ctx.fillStyle = dimHex(line.color, 0.08);
          ctx.fillText(line.text, LEFT_MARGIN, zone.mid);
          ctx.restore();

          // Unscanned — full color
          ctx.save();
          ctx.beginPath();
          ctx.rect(scanX, zone.top, canvas.width - scanX, zone.h);
          ctx.clip();
          ctx.fillStyle = line.color;
          ctx.fillText(line.text, LEFT_MARGIN, zone.mid);
          ctx.restore();
        });

        // Scan line
        ctx.strokeStyle = "#ff3333";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(scanX, 0);
        ctx.lineTo(scanX, canvas.height);
        ctx.stroke();

        // Active frequency dots — colored per line
        lines.forEach((line, li) => {
          const freqs = lastFreqs[li];
          if (!freqs.length) return;
          const preset = CHAR_PRESETS[line.char];
          const zone = zoneOf(li);

          freqs.forEach((freq) => {
            const t = Math.log(freq / preset.minFreq) / Math.log(preset.maxFreq / preset.minFreq);
            const y = zone.top + zone.h * (1 - t);
            ctx.fillStyle = line.color;
            ctx.beginPath();
            ctx.arc(scanX, y, 2.5, 0, Math.PI * 2);
            ctx.fill();
          });
        });
      }

      function dimHex(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const bg = 10;
        return `rgb(${Math.round(r * alpha + bg * (1 - alpha))},${Math.round(
          g * alpha + bg * (1 - alpha)
        )},${Math.round(b * alpha + bg * (1 - alpha))})`;
      }

      // ─── Font drag-and-drop ───────────────────────────────────────────────────────

      const fontDropOverlay = document.getElementById("fontDropOverlay");
      const fontDropBorder = document.getElementById("fontDropBorder");
      let dragCounter = 0;

      document.addEventListener("dragenter", (e) => {
        if (![...e.dataTransfer.items].some((it) => it.kind === "file")) return;
        if (++dragCounter === 1) {
          fontDropOverlay.classList.add("visible");
          fontDropBorder.classList.add("visible");
        }
      });
      document.addEventListener("dragleave", () => {
        if (--dragCounter <= 0) {
          dragCounter = 0;
          fontDropOverlay.classList.remove("visible");
          fontDropBorder.classList.remove("visible");
        }
      });
      document.addEventListener("dragover", (e) => e.preventDefault());
      document.addEventListener("drop", (e) => {
        e.preventDefault();
        dragCounter = 0;
        fontDropOverlay.classList.remove("visible");
        fontDropBorder.classList.remove("visible");

        const file = e.dataTransfer.files[0];
        if (!file) return;
        if (!["otf", "ttf", "woff", "woff2"].includes(file.name.split(".").pop().toLowerCase()))
          return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
          const familyName = file.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");
          const face = new FontFace(familyName, evt.target.result);
          try {
            await face.load();
          } catch (err) {
            console.warn("Font load failed:", err);
            return;
          }
          document.fonts.add(face);
          currentFontFamily = `"${familyName}", monospace`;
          currentFontName = familyName;
          fontNameTag.textContent = familyName;
          lines.forEach((l) => {
            if (l._input) l._input.style.fontFamily = currentFontFamily;
          });
          if (!isPlaying) renderText();
        };
        reader.readAsArrayBuffer(file);
      });

      // ─── Controls ─────────────────────────────────────────────────────────────────

      playBtn.addEventListener("click", startPlayback);
      stopBtn.addEventListener("click", () => stopPlayback(false));

      speedSlider.addEventListener("input", () => {
        document.getElementById("speedVal").textContent = speedSlider.value;
      });
      sizeSlider.addEventListener("input", () => {
        document.getElementById("sizeVal").textContent = sizeSlider.value;
        if (!isPlaying) renderText();
      });
      trackingSlider.addEventListener("input", () => {
        document.getElementById("trackingVal").textContent = trackingSlider.value;
        if (!isPlaying) renderText();
      });
      lineHeightSlider.addEventListener("input", () => {
        const v = parseInt(lineHeightSlider.value) / 100;
        document.getElementById("lineHeightVal").textContent = v.toFixed(2);
        if (!isPlaying) renderText();
      });

      document.addEventListener("keydown", (e) => {
        if (document.activeElement.classList.contains("line-input")) return;
        if (e.code === "Space") {
          e.preventDefault();
          if (isPlaying) stopPlayback(false);
          else startPlayback();
        }
      });

      window.addEventListener("resize", resizeCanvas);
      document.fonts.load(`bold 40px "Score"`).then(() => resizeCanvas()).catch(() => resizeCanvas());
    </script>
  </body>
</html>
